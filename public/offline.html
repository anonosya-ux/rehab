<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Нет подключения — ЦПА «Цель»</title>
  <style>
    :root { --bg: #0a0f1c; --text: #e8e8ed; --muted: #6b7280; --accent: #ef4444; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .container { max-width: 480px; }
    .icon { font-size: 4rem; margin-bottom: 1.5rem; }
    h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
    p { color: var(--muted); margin-bottom: 2rem; line-height: 1.6; }
    .phone-link {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1.5rem;
      background: var(--accent);
      color: white;
      border-radius: 0.75rem;
      text-decoration: none;
      font-weight: 600;
      transition: opacity 0.2s;
    }
    .phone-link:hover { opacity: 0.9; }
    .retry { 
      display: block; 
      margin-top: 1rem; 
      color: var(--muted); 
      cursor: pointer; 
      background: none; 
      border: none; 
      font-size: 0.875rem;
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📡</div>
    <h1>Нет подключения к интернету</h1>
    <p>Страница недоступна без подключения. Вы можете позвонить нам напрямую — мы работаем 24/7.</p>
    <a href="tel:+74954141113" class="phone-link">
      📞 +7 495 414-11-13
    </a>
    <button class="retry" onclick="window.location.reload()">
      Попробовать снова
    </button>
  </div>
</body>
</html>
